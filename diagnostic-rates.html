        title: "Glaçage pas assez brillant",
        cause: "Causes possibles : pas assez de sirop de glucose (qui donne la brillance), pas assez de gélatine (qui donne la tenue), ou coulé à la mauvaise température",
        fix: "Ratio standard : 150g sucre, 150g glucose, 75g eau, 100g lait concentré, 150g chocolat blanc, 10g gélatine. Le glucose est CRITIQUE pour la brillance. La gélatine en feuille, bien hydratée"
      },
      d_mixage: {
        title: "Problème d'émulsion probable",
        cause: "Si la température est bonne mais l'aspect pas uniforme, c'est l'émulsion qui n'est pas parfaite. Trop mixé ou pas assez",
        fix: "Mixage court et incliné. Puis laisse reposer le glaçage 10 min avant de couler pour que les bulles résiduelles remontent. Passe au chinois étamine avant utilisation"
      }
    }
  }
};

function init() {
  const container = document.getElementById('recipes');
  Object.keys(tree).forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'recipe-btn';
    btn.innerHTML = `
      <div class="recipe-name">${tree[key].name}</div>
      <div class="recipe-sub">${tree[key].sub}</div>
    `;
    btn.onclick = () => selectRecipe(key, btn);
    container.appendChild(btn);
  });
}

function selectRecipe(key, btnEl) {
  document.querySelectorAll('.recipe-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  document.getElementById('diagnosisContainer').innerHTML = '';
  showQuestion(key, tree[key].start);
}

function showQuestion(recipeKey, questionId) {
  const recipe = tree[recipeKey];
  const q = recipe.questions[questionId];
  if (!q) return;

  const container = document.getElementById('questionContainer');
  container.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'question-card visible';
  card.innerHTML = `<h3>${q.text}</h3><div class="options"></div>`;

  const optsDiv = card.querySelector('.options');
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt.text;
    btn.onclick = () => handleAnswer(recipeKey, opt.next);
    optsDiv.appendChild(btn);
  });

  container.appendChild(card);
  card.scrollIntoView({behavior: 'smooth', block: 'center'});
}

function handleAnswer(recipeKey, nextId) {
  if (nextId.startsWith('d_')) {
    showDiagnosis(recipeKey, nextId);
  } else {
    showQuestion(recipeKey, nextId);
  }
}

function showDiagnosis(recipeKey, diagId) {
  const recipe = tree[recipeKey];
  const diag = recipe.diagnoses[diagId];
  document.getElementById('questionContainer').innerHTML = '';

  const container = document.getElementById('diagnosisContainer');
  container.innerHTML = `
    <div class="diagnosis visible">
      <h3>${diag.title}</h3>
      <p><strong style="color:#C8A04A;font-family:'Courier New',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:8px">Ce qui s'est passé</strong>${diag.cause}</p>
      <div class="fix">
        <strong>La solution</strong>
        ${diag.fix}
      </div>
      <button class="reset" onclick="resetDiagnosis()">← Nouveau diagnostic</button>
    </div>
  `;
  container.scrollIntoView({behavior: 'smooth', block: 'center'});
}

function resetDiagnosis() {
  document.querySelectorAll('.recipe-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('questionContainer').innerHTML = '';
  document.getElementById('diagnosisContainer').innerHTML = '';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

init();
</script>
</body>
</html>
